backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  - name: "blog"
    label: "Blog"
    label_singular: "Artigo"
    folder: "src/content/blog"
    create: true
    format: "mdx-frontmatter"
    extension: mdx
    slug: "{{slug}}"
    preview_path: "blog/{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Resumo", name: "excerpt", widget: "text" }
      - { label: "Data de publicação", name: "publishedAt", widget: "datetime" }
      - { label: "Data de atualização", name: "updatedAt", widget: "datetime", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Tempo de leitura", name: "readingTime", widget: "string", required: false }
      - label: "Serviços relacionados"
        name: "relatedServices"
        widget: "list"
        required: false
        field: { label: "Slug", name: "slug", widget: "string" }
      - { label: "Rascunho", name: "draft", widget: "boolean", default: false }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
